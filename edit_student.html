<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Edit Student</h2>

    <form method="POST">

        <input type="text" name="name" value="{{ student[1] }}" required><br><br>

        <input type="text" name="department" value="{{ student[2] }}" required><br><br>

        <input type="email" name="email" value="{{ student[3] }}" required><br><br>

        <input type="text" name="phone" value="{{ student[4] }}" required><br><br>

        <button type="submit">Update Student</button>

    </form>

    <br>

    <a href="/students">Back to Students</a>

</body>
</html>
