<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Students List</h2>

    <a href="/add">Add New Student</a>

    <br><br>

    <table border="1" cellpadding="10">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}

        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>{{ student[4] }}</td>

            <td>
                <a href="/edit/{{ student[0] }}">Edit</a>

                <a href="/delete/{{ student[0] }}"
                   onclick="return confirm('Delete this student?')">
                   Delete
                </a>
            </td>
        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/dashboard">Dashboard</a>

</body>
</html>
